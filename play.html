<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Shawn Zhang</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .play-wrapper {
            max-width: 1020px;
            margin: 0 auto;
            padding: 20px;
        }

        .play-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .play-header h1 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--color-text);
        }

        .play-back {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .play-back:hover {
            color: var(--color-primary);
        }

        .play-frame-container {
            position: relative;
            width: 100%;
            aspect-ratio: 960 / 600;
            background: #1e293b;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .play-frame-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .play-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .play-controls button {
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            background: var(--color-card);
            color: var(--color-text);
            cursor: pointer;
            transition: all var(--transition);
        }

        .play-controls button:hover {
            background: var(--color-bg);
        }

        .play-mobile-warning {
            display: none;
            background: #fef3c7;
            color: #92400e;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .play-mobile-warning {
                display: block;
            }

            .play-frame-container {
                border-radius: 8px;
            }

            .play-header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">Shawn Zhang</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="/#shipped-games">Shipped Games</a></li>
                <li><a href="/#personal-projects">Personal Projects</a></li>
                <li><a href="/#learning-projects">Game Jam & Learning</a></li>
                <li><a href="/#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="play-wrapper">
        <div class="play-header">
            <a href="/" class="play-back">&larr; Back to Portfolio</a>
            <h1 id="game-title">Loading...</h1>
        </div>

        <div class="play-mobile-warning">
            These Unity WebGL games work best on desktop. You may experience performance issues on mobile.
        </div>

        <div class="play-frame-container">
            <iframe id="game-frame" allowfullscreen></iframe>
        </div>

        <div class="play-controls">
            <button onclick="document.getElementById('game-frame').contentWindow.document.querySelector('#unity-fullscreen-button')?.click()" title="Fullscreen">
                Fullscreen
            </button>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        const games = {
            'hampter-ball':        { title: 'Hampter Ball',            src: 'WebGL_HB/index_HB.html' },
            'animal-ambiguity':    { title: 'Animal Ambiguity',        src: 'Animal_ Ambiguity_Web/index_Animal_Ambiguity.html' },
            'remote':              { title: 'Remote Code Execution',   src: 'Remote_Code_Execution_Web/index_Remote.html' },
            'scrappy-squirrel':    { title: 'Scrappy Squirrel',        src: 'Scrappy_Squirrel_Web/index_Scrappy_Squirrel.html' },
            'level-design-3d':     { title: 'Level Design 3D',         src: 'Level-Design_3D_Web/index_Level_Design-3D.html' },
            'side-scroller':       { title: 'Side Scroller',           src: 'Side Scroller Web/index_Side_Scroller.html' },
        };

        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('game');
        const game = games[gameId];

        if (game) {
            document.getElementById('game-title').textContent = game.title;
            document.getElementById('game-frame').src = game.src;
            document.title = game.title + ' - Shawn Zhang';
        } else {
            document.getElementById('game-title').textContent = 'Game not found';
            document.querySelector('.play-frame-container').innerHTML =
                '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;">Game not found. <a href="/" style="margin-left:8px;">Go back</a></div>';
        }
    </script>
</body>
</html>
