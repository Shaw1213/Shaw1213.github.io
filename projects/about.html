<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Shawn Zhang</title>
    <meta name="description" content="Shawn Zhang - Combat Designer portfolio. Shipped 2 Steam titles. Specialized in melee combat systems and gameplay design.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23dc2626'/><text x='16' y='22' font-family='Arial' font-size='18' font-weight='bold' fill='white' text-anchor='middle'>SZ</text></svg>">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <canvas id="combat-canvas" class="dot-grid"></canvas>
    <nav class="top-nav">
        <a href="../" class="nav-name">Shawn Zhang <span class="nav-title">Combat Designer</span></a>
        <button id="lang-toggle" class="lang-toggle" title="Switch language">中文</button>
        <div class="nav-cats">
            <a href="../" class="nav-link" data-i18n="nav.home">Home</a>
            <div class="nav-cat">
                <span class="nav-cat-label" data-i18n="nav.works">Projects</span>
                <div class="nav-dropdown">
                    <a href="greatsword.html" data-i18n="nav.dd.greatsword">Greatsword Combat System</a>
                    <a href="beamdown.html">Beamdown</a>
                    <a href="bricks-over-blocks.html">Bricks Over Blocks</a>
                    <a href="dungeons-and-drinks.html">Dungeons & Drinks</a>
                    <a href="hampter-ball.html">Hampter Ball</a>
                </div>
            </div>
            <a href="about.html" class="nav-link" data-i18n="nav.about">About</a>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main class="detail-content">
        <a href="../" class="detail-back" data-i18n="nav.back">&larr; Back to Portfolio</a>

        <header class="detail-header">
            <h1 data-i18n="about.title">Resume</h1>
            <div class="detail-actions">
                <a href="../Images/resume-en.pdf" class="btn btn-primary" target="_blank" data-i18n="about.resume">Download Resume (EN)</a>
                <a href="../Images/resume-zh.pdf" class="btn btn-outline" target="_blank" data-i18n="about.resume.zh">下载简历 (中文)</a>
            </div>
        </header>

        <section class="detail-section">
            <div class="detail-media" style="background: #fff; border-radius: 8px; overflow: hidden;">
                <embed src="../Images/resume-en.pdf#toolbar=0&navpanes=0" type="application/pdf" width="100%" style="height: 80vh;" id="resume-viewer">
            </div>
        </section>
    </main>

    <script>
        const toggle = document.querySelector('.nav-toggle');
        const cats = document.querySelector('.nav-cats');
        toggle.addEventListener('click', () => { cats.classList.toggle('open'); toggle.classList.toggle('active'); });
        cats.querySelectorAll('a').forEach(a => { a.addEventListener('click', () => { cats.classList.remove('open'); toggle.classList.remove('active'); }); });
    </script>
    <script src="../js/combat-vfx.js"></script>
    <script src="../js/i18n.js?v=6"></script>
    <script>
        // Switch PDF viewer based on language
        function updateResume() {
            var lang = localStorage.getItem('lang') || 'en';
            var params = new URLSearchParams(window.location.search);
            if (params.has('lang')) lang = params.get('lang');
            var viewer = document.getElementById('resume-viewer');
            if (viewer) viewer.src = lang === 'zh' ? '../Images/resume-zh.pdf#toolbar=0&navpanes=0' : '../Images/resume-en.pdf#toolbar=0&navpanes=0';
        }
        updateResume();
        var btn = document.getElementById('lang-toggle');
        if (btn) btn.addEventListener('click', function() { setTimeout(updateResume, 50); });
    </script>
</body>
</html>
